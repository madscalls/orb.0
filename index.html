<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>orb.</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lacquer&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./pages/index.css" />
  </head>
  <body>
    <header>
      <nav class="nav">
        <div class="nav__search-container">
          <input
            type="search"
            class="nav__search"
            placeholder="what are you looking for?"
          />
        </div>
        <div class="nav__menu">
          <button type="button" class="nav__button">WHO</button>
          <button type="button" class="nav__button">WHAT</button>
          <button type="button" class="nav__button">WHEN</button>
          <button type="button" class="nav__button">WHERE</button>
        </div>
      </nav>
    </header>
    <div class="page">
      <main>
        <section class="orb__section">
          <div class="orb">
            <script src="https://cdn.jsdelivr.net/npm/three@0.153.0/build/three.min.js"></script>
          </div>
        </section>
        <section class="orb__menu-container">
          <div class="orb__menu">
            <div class="container noselect">
              <div class="canvas">
                <div class="tracker tr-1"></div>
                <div class="tracker tr-2"></div>
                <div class="tracker tr-3"></div>
                <div class="tracker tr-4"></div>
                <div class="tracker tr-5"></div>
                <div class="tracker tr-6"></div>
                <div class="tracker tr-7"></div>
                <div class="tracker tr-8"></div>
                <div class="tracker tr-9"></div>
                <div class="tracker tr-10"></div>
                <div class="tracker tr-11"></div>
                <div class="tracker tr-12"></div>
                <div class="tracker tr-13"></div>
                <div class="tracker tr-14"></div>
                <div class="tracker tr-15"></div>
                <div class="tracker tr-16"></div>
                <div class="tracker tr-17"></div>
                <div class="tracker tr-18"></div>
                <div class="tracker tr-19"></div>
                <div class="tracker tr-20"></div>
                <div class="tracker tr-21"></div>
                <div class="tracker tr-22"></div>
                <div class="tracker tr-23"></div>
                <div class="tracker tr-24"></div>
                <div class="tracker tr-25"></div>
                <div id="card">
                  <p id="prompt">
                    <img
                      src="./images/settings.svg"
                      alt="settings"
                      class="orb__menu-settings"
                    />
                  </p>
                  <div class="title">MENU</div>
                  <div class="subtitle">2025 MTC</div>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
    <footer></footer>
    <script src="./scripts/index.js"></script>
  </body>
</html>
