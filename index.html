      </main>

    <div class="orb-radial orb-radial_hidden"><button class="orb-radial__button orb-radial__close" data-action="close">
  ×
</button>
      <button class="orb-radial__button" data-action="color">
        <img
          src="/src/assets/images/palette.svg"
          alt="color"
          class="radial__img"
        />
      </button>
      <button class="orb-radial__button" data-action="sparkle">
        <img
          src="/src/assets/images/stars.svg"
          alt="sparkle"
          class="radial__img"
        />
      </button>
      <button class="orb-radial__button" data-action="material">
        <img
          src="/src/assets/images/gears.svg"
          alt="gears"
          class="radial__img"
        />
      </button>
      <button class="orb-radial__button" data-action="shape">
        <img src="/src/assets/images/shape.svg" alt="Shape" class="radial__img" />
      </button>
    </div>
    <div class="orb-modal orb-modal_hidden">
  <div class="orb-modal__box">
    <button class="orb-modal__close"> X </button>

    <div class="orb-gradient">
      <div class="orb-gradient__bar" data-gradient-bar></div>

      <div class="orb-gradient__controls">
        <input type="range" class="orb-gradient__pos" data-pos-slider min="0" max="100" value="0" />
        <span class="orb-gradient__pos-out" data-pos-out>0%</span>
        <button class="orb-gradient__add" data-add-stop aria-label="Add stop">+</button>
        <button class="orb-gradient__remove" data-remove-stop aria-label="Remove stop">&times;</button>
      </div>

      <div class="orb-gradient__satval" data-satval>
        <div class="orb-gradient__sv-thumb" data-sv-thumb></div>
      </div>

      <div class="orb-gradient__hue" data-hue>
        <div class="orb-gradient__hue-thumb" data-hue-thumb></div>
      </div>

      <div class="orb-gradient__hex-row">
        <div class="orb-gradient__swatch" data-swatch></div>
        <div class="orb-gradient__hex-field">
          <span>#</span>
          <input type="text" class="orb-gradient__hex-input" data-hex-input maxlength="6" /><button class="orb-gradient__submit" data-apply-gradient>
  Apply Gradient
</button>
        </div>
      </div>
    </div>
  </div>
